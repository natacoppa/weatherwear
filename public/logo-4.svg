<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 3: A shirt collar with a small sun in the corner -->
  <g>
    <!-- Left collar leaf (cream fill, tan stroke) -->
    <path d="M32 18 L14 42 C12 46 16 50 24 50 L32 50 V18 Z" fill="#f5f0ea" stroke="#d4b896" stroke-width="2" stroke-linejoin="round"/>
    <!-- Right collar leaf (cream fill, tan stroke) -->
    <path d="M32 18 L50 42 C52 46 48 50 40 50 L32 50 V18 Z" fill="#f5f0ea" stroke="#d4b896" stroke-width="2" stroke-linejoin="round"/>
    <!-- Small sun (sage green) positioned elegantly in the corner of the left collar -->
    <circle cx="18" cy="40" r="4" fill="#6b7c5e"/>
    <!-- Subtle sun rays (cream) -->
    <line x1="18" y1="36" x2="18" y2="34" stroke="#f5f0ea" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20.8" y1="37.2" x2="22.8" y2="36.2" stroke="#f5f0ea" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15.2" y1="37.2" x2="13.2" y2="36.2" stroke="#f5f0ea" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>