<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 2: A hanger shape with sun rays -->
  <g>
    <!-- Sun (sage green) positioned slightly behind the hanger's hook -->
    <circle cx="32" cy="6" r="6" fill="#6b7c5e"/>
    <!-- Short, subtle rays (cream) from the sun -->
    <line x1="32" y1="0" x2="32" y2="2" stroke="#f5f0ea" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="34.8" y1="1.2" x2="36.8" y2="2.2" stroke="#f5f0ea" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="29.2" y1="1.2" x2="27.2" y2="2.2" stroke="#f5f0ea" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Hanger body (cream fill, tan stroke) -->
    <path d="M16 24 C16 50 32 58 32 58 C32 58 48 50 48 24 L32 8 L16 24 Z" fill="#f5f0ea" stroke="#d4b896" stroke-width="2" stroke-linejoin="round"/>
    <!-- Hanger hook (tan), slightly overlapping the sun -->
    <path d="M32 8 V4 C30 2 28 2 28 4 S26 6 28 8 H32 Z" fill="#d4b896"/>
  </g>
</svg>